version: '3.9'
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme_in_production}
    networks:
      - pinakk

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    restart: unless-stopped
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    networks:
      - pinakk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/payments/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    restart: unless-stopped
    env_file:
      - ./client/.env.production
    depends_on:
      - server
    networks:
      - pinakk

volumes:
  mongo-data:

networks:
  pinakk:
    driver: bridge
